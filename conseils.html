<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conseiller IA — Suivi des dépenses</title>
    <link rel="stylesheet" href="conseils.css">
</head>
</body>
    </div class="app">

     <!-- ── En-tête ── -->
        <header class="header">
            <a href="/" class="retour">← Retour</a>
            <div class="header-titre">
                <span class="header-icone">🤖</span>
                <div>
                    <h1>Conseiller IA</h1>
                    <p>Propulsé par Groq · llama-3.3-70b-versatile</p>
                </div>
            </div>
        </header>

         <!-- ── Zone de messages ── -->
        <main class="chat-container" id="chatContainer">

            <!-- Message de bienvenue affiché au chargement -->
            <div class="message message-ia" id="messageBienvenue">
                <div class="message-bulle">
                    <p>Bonjour ! Je suis ton conseiller budgétaire IA. 👋</p>
                    <p>J'ai accès à toutes tes dépenses et je peux t'aider à mieux gérer ton budget étudiant. Comment puis-je t'aider ?</p>
                </div>
                <span class="message-heure" id="heureBienvenue"></span>
            </div>

        </main>

        <!-- ── Suggestions de démarrage ── -->
        <div class="suggestions" id="suggestions">
            <button class="suggestion-chip"
                    data-message="Analyse mes dépenses ce mois-ci"
                    onclick="utiliserSuggestion(this)">
                📊 Analyse mes dépenses ce mois-ci
            </button>
            <button class="suggestion-chip"
                    data-message="Comment je peux économiser ?"
                    onclick="utiliserSuggestion(this)">
                💡 Comment je peux économiser ?
            </button>
            <button class="suggestion-chip"
                    data-message="Où est-ce que je dépense trop ?"
                    onclick="utiliserSuggestion(this)">
                🔍 Où est-ce que je dépense trop ?
            </button>
            <button class="suggestion-chip"
                    data-message="Montre-moi un résumé de mes finances"
                    onclick="utiliserSuggestion(this)">
                📈 Résumé de mes finances
            </button>
        </div>
